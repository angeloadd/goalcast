<div class="space-y-2 mb-4">
  @if (label()) {
    <label class="text-sm font-medium">{{ label() }}</label>
  }
  <ng-content/>
  @if (description()) {
    <p data-description class="text-muted-foreground text-sm">{{ description() }}</p>
  }
  @if (errorMessage()) {
    <p data-error class="text-destructive text-sm">{{ errorMessage() }}</p>
  }
</div>
