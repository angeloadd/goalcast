spring:
    application:
        name: fantabet
    datasource:
        url: jdbc:postgresql://localhost:5432/fantabet
        username: fantabet
        password: ${DB_PASSWORD:fantabet_dev}
    jpa:
        hibernate:
            ddl-auto: validate
        open-in-view: false
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
    flyway:
        enabled: true
        locations: classpath:db/migration
    session:
        store-type: redis
    data:
        redis:
            host: ${SPRING_DATA_REDIS_HOST:localhost}
            port: 6379

server:
    port: 8080
    servlet:
        session:
            cookie:
                http-only: true
                secure: false
                same-site: lax
                name: FANTABET_SESSION
            timeout: 30m
