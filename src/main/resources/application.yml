spring:
    application:
        name: goalcast
    datasource:
        url: jdbc:postgresql://localhost:${DB_PORT:5433}/goalcast
        username: goalcast
        password: ${DB_PASSWORD:goalcast_dev}
    jpa:
        hibernate:
            ddl-auto: validate
        open-in-view: false
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
    flyway:
        enabled: true
        locations: classpath:db/migration
    session:
        redis:
            repository-type: indexed
    jackson:
        time-zone: Europe/Berlin
    data:
        redis:
            host: ${SPRING_DATA_REDIS_HOST:localhost}
            port: 6379

server:
    port: 8080
    servlet:
        session:
            cookie:
                http-only: true
                secure: false
                same-site: lax
                name: GOALCAST_SESSION
            timeout: 30m

apisport:
    base-url: https://v3.football.api-sports.io
    api-key: ${APISPORT_API_KEY:20b38983e5254e332fccb0ba26cd1e5c}
