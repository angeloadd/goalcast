spring:
    task:
        scheduling:
            enabled: false
    datasource:
        url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
        username: sa
        password:
        driver-class-name: org.h2.Driver
    jpa:
        hibernate:
            ddl-auto: create-drop
        open-in-view: false
        properties:
            hibernate:
                dialect: org.hibernate.dialect.H2Dialect
    flyway:
        enabled: false
    session:
        store-type: none
    data:
        redis:
            host: localhost
            port: 6379

server:
    servlet:
        session:
            cookie:
                http-only: true
                secure: false
                same-site: lax
                name: GOALCAST_SESSION
            timeout: 30m
